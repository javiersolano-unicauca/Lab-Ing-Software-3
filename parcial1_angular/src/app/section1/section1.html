<section id="promotions" class="container-fluid row">
    <div id="carousel" class="carousel mt-3 col-sm-12 col-md-10 col-lg-12 slide container-fluid" data-bs-ride="carousel">
        <div class="carousel-inner w-100 h-100">
            @for(item of items; track items)
            {
                <div class="carousel-item w-100 h-100 active">
                    <img src="{{item}}.jpg" class="d-block img-fluid rounded-4 w-100 h-100" alt="...">
                </div>
            }
        </div>
        <button class="carousel-control-prev" type="button" data-bs-target="#carousel" data-bs-slide="prev">
            <span class="carousel-control-prev-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Previous</span>
        </button>
        <button class="carousel-control-next" type="button" data-bs-target="#carousel" data-bs-slide="next">
            <span class="carousel-control-next-icon" aria-hidden="true"></span>
            <span class="visually-hidden">Next</span>
        </button>
    </div>
</section>
